<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Blocked — Easy Redirect</title>
    <style>
        :root {
            --bg: #fafafa;
            --bg-card: #fff;
            --text: #222;
            --text-muted: #666;
            --border: #ddd;
            --accent: #e53935;
            --accent-light: #fdecea;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --bg-card: #1e1e1e;
                --text: #e0e0e0;
                --text-muted: #9e9e9e;
                --border: #333;
                --accent: #ef5350;
                --accent-light: #3a1010;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            padding: 32px 16px;
        }
        .card {
            max-width: 480px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 10px;
            padding: 36px 32px;
            text-align: center;
            box-shadow: 0 2px 16px rgba(0,0,0,.08);
        }
        #blockedImage {
            display: none;
            max-width: 180px;
            max-height: 180px;
            border-radius: 8px;
            margin: 0 auto 20px;
            object-fit: contain;
        }
        #blockedImage.visible { display: block; }
        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }
        #blockedMessage {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #blockedFrom {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 24px;
            word-break: break-all;
        }
        #motivationQuote {
            display: none;
            font-size: 14px;
            font-style: italic;
            color: var(--text-muted);
            border-left: 3px solid var(--accent);
            padding: 8px 14px;
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        #motivationQuote.visible { display: block; }
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { opacity: .88; }
        .btn-secondary {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { color: var(--text); border-color: var(--text-muted); }
    </style>
</head>
<body>
<div class="card">
    <img id="blockedImage" src="" alt="">
    <h1 id="blockedTitle">Site Blocked</h1>
    <p id="blockedMessage"></p>
    <p id="blockedFrom"></p>
    <blockquote id="motivationQuote"></blockquote>
    <div class="actions">
        <a class="btn btn-primary" href="#" id="goBackBtn">Go back</a>
        <a class="btn btn-secondary" id="settingsBtn"
           href="chrome-extension://PLACEHOLDER/options.html">Settings</a>
    </div>
</div>
<script src="blocked.js"></script>
</body>
</html>
